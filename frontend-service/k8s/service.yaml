apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: inspire
  labels:
    app: frontend-service
spec:
  selector:
    app: frontend-service
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  # ClusterIP: internal only. External traffic comes through the ingress.
  type: ClusterIP
