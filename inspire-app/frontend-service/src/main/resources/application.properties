spring.application.name=frontend-service
server.port=8080

# URLs of backend microservices.
# In Kubernetes these are overridden by env vars IMAGE_SERVICE_URL / PHRASE_SERVICE_URL.
# Spring Boot relaxed binding maps IMAGE_SERVICE_URL -> image.service.url automatically.
image.service.url=http://localhost:8081
phrase.service.url=http://localhost:8082

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
