<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>INSPIRE — A moment, a phrase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="grain"></div>

    <header class="site-header">
        <span class="logo-mark">◈</span>
        <span class="logo-text">INSPIRE</span>
        <span class="logo-sub">image &amp; phrase engine</span>
    </header>

    <main class="stage">

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
            <p class="empty-eyebrow">press the button</p>
            <p class="empty-headline">to receive a vision</p>
        </div>

        <!-- Image + phrase card (hidden until first click) -->
        <div class="card" id="card" aria-live="polite">
            <div class="card-image-wrap">
                <img class="card-image" id="cardImage" src="" alt="Inspired image" />
                <div class="card-image-overlay"></div>
            </div>
            <div class="card-phrase-wrap">
                <blockquote class="card-phrase" id="cardPhrase"></blockquote>
                <div class="card-divider"></div>
            </div>
        </div>

        <!-- Loading skeleton -->
        <div class="skeleton" id="skeleton" hidden>
            <div class="skeleton-image"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line skeleton-line--short"></div>
        </div>

        <!-- Error -->
        <div class="error-box" id="errorBox" hidden>
            <span class="error-icon">⚠</span>
            <p id="errorMessage">A service is unreachable. Check that all microservices are running.</p>
        </div>

    </main>

    <div class="trigger-zone">
        <button class="inspire-btn" id="inspireBtn" aria-label="Get a new inspired image and phrase">
            <span class="btn-inner">
                <span class="btn-label">Get Inspired</span>
                <span class="btn-arrow">→</span>
            </span>
            <span class="btn-ring"></span>
        </button>
        <p class="trigger-hint" id="triggerHint">click to receive a vision</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
