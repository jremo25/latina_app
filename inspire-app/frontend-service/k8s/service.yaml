apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: inspire
  labels:
    app: frontend-service
spec:
  selector:
    app: frontend-service
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  # LoadBalancer causes AKS to provision a public Azure Load Balancer.
  # After applying, run: kubectl get svc frontend-service -n inspire
  # and use the EXTERNAL-IP to open the app in a browser.
  type: LoadBalancer
