trigger:
  branches:
    include:
      - main
  paths:
    include:
      - image-service/**
      - pom.xml
      - azure/pipelines/image-service.yml

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: templates
      type: git
      name: PetClinic/latina_app_template
      ref: main

variables:
  # AKS and Common Variables
  aksServiceConnection: 'aks-service-connection'
  imageRepository: 'image-service'

  # UPDATE THIS VALUE: Replace with the actual suffix generated by your ARM deployment
  uniqueSuffix: 'ddcimehi'

  # Dev Environment
  devAcrConnection: 'dev-acr-service-connection'
  devAcrLoginServer: 'acrlatinadev$(uniqueSuffix).azurecr.io'

  # Testing Environment
  testAcrConnection: 'test-acr-service-connection'
  testAcrLoginServer: 'acrlatinatest$(uniqueSuffix).azurecr.io'

  # Prod Environment
  prodAcrConnection: 'prod-acr-service-connection'
  prodAcrLoginServer: 'acrlatinaprod$(uniqueSuffix).azurecr.io'
  
stages:
- stage: Build
  displayName: 'Build Image Service'
  jobs:
  - job: BuildJob
    steps:
    - template: build.yaml@templates
      parameters:
        serviceName: 'image-service'
        devAcrConnection: '$(devAcrConnection)'
        imageRepository: '$(imageRepository)'

- stage: DeployDev
  displayName: 'Deploy to Development'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - template: deploy.yaml@templates
    parameters:
      environmentName: 'dev'
      namespace: 'dev'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: false
      targetAcrConnection: '$(devAcrConnection)'
      targetAcrLoginServer: '$(devAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'image-service'

- stage: ApproveTesting
  displayName: 'Manual Approval - Promote to Testing'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - job: WaitForApprovalTesting
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: 'Please validate Dev deployment and approve promotion to Testing.'

- stage: DeployTest
  displayName: 'Deploy to Testing'
  dependsOn: ApproveTesting
  condition: succeeded()
  jobs:
  - template: deploy.yaml@templates
    parameters:
      environmentName: 'testing'
      namespace: 'test'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: true
      sourceAcrConnection: '$(devAcrConnection)'
      sourceAcrLoginServer: '$(devAcrLoginServer)'
      targetAcrConnection: '$(testAcrConnection)'
      targetAcrLoginServer: '$(testAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'image-service'

- stage: ApproveProd
  displayName: 'Manual Approval - Promote to Production'
  dependsOn: DeployTest
  condition: succeeded()
  jobs:
  - job: WaitForApprovalProd
    pool: server
    timeoutInMinutes: 1440
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: 'Please confirm Testing sign-off and approve Production deployment.'

- stage: DeployProd
  displayName: 'Deploy to Production'
  dependsOn: ApproveProd
  condition: succeeded()
  jobs:
  - template: deploy.yaml@templates
    parameters:
      environmentName: 'prod'
      namespace: 'prod'
      aksServiceConnection: '$(aksServiceConnection)'
      promoteImage: true
      sourceAcrConnection: '$(testAcrConnection)'
      sourceAcrLoginServer: '$(testAcrLoginServer)'
      targetAcrConnection: '$(prodAcrConnection)'
      targetAcrLoginServer: '$(prodAcrLoginServer)'
      imageRepository: '$(imageRepository)'
      imageTag: '$(Build.BuildId)'
      serviceName: 'image-service'
