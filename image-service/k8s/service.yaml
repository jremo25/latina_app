apiVersion: v1
kind: Service
metadata:
  name: image-service
  namespace: inspire
  labels:
    app: image-service
spec:
  selector:
    app: image-service
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  # ClusterIP = internal only. The frontend reaches this via Kubernetes DNS:
  # http://image-service resolves to this service from within the cluster.
  type: ClusterIP
