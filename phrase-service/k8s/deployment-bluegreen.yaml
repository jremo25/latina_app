apiVersion: apps/v1
kind: Deployment
metadata:
  name: phrase-service-#{SLOT}#
  namespace: inspire
  labels:
    app: phrase-service
    slot: #{SLOT}#
    app.kubernetes.io/part-of: inspire-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phrase-service
      slot: #{SLOT}#
  template:
    metadata:
      labels:
        app: phrase-service
        slot: #{SLOT}#
    spec:
      containers:
      - name: phrase-service
        image: <ACR_LOGIN_SERVER>/phrase-service:#{IMAGE_TAG}#
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3